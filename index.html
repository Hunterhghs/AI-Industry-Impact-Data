<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Impact on Industries — Data Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Bar -->
  <header id="topbar">
    <div id="topbar-left">
      <svg id="logo-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
      <span id="workbook-title">AI Impact on Industries</span>
    </div>
    <div id="topbar-right">
      <div id="search-box">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search cells…" autocomplete="off">
        <span id="search-count"></span>
        <button id="search-prev" class="search-nav" title="Previous match">&#9650;</button>
        <button id="search-next" class="search-nav" title="Next match">&#9660;</button>
        <button id="search-clear" class="search-nav" title="Clear search">&times;</button>
      </div>
      <button id="download-btn" title="Download original .xlsx">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Download</span>
      </button>
    </div>
  </header>

  <!-- Formula Bar -->
  <div id="formula-bar">
    <div id="cell-ref">A1</div>
    <div id="cell-value-display"></div>
  </div>

  <!-- Spreadsheet -->
  <div id="spreadsheet-container">
    <!-- Corner -->
    <div id="corner"></div>
    <!-- Column Headers -->
    <div id="col-headers-wrapper">
      <div id="col-headers"></div>
    </div>
    <!-- Row Headers -->
    <div id="row-headers-wrapper">
      <div id="row-headers"></div>
    </div>
    <!-- Cell Grid -->
    <div id="grid-wrapper">
      <div id="grid"></div>
    </div>
  </div>

  <!-- Sheet Tabs -->
  <div id="sheet-tabs-bar">
    <div id="sheet-tabs"></div>
    <div id="sheet-info"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
